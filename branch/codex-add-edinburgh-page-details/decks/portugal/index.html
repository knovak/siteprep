<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portugal Deck | Overview</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <link rel="manifest" href="../../manifest.webmanifest">
  <script defer src="./assets/scripts.js"></script>
</head>
<body>
  <header class="card">
    <div class="card-header">
      <a href="index.html" class="tag">Deck</a>
      <h1>Portugal</h1>
    </div>
    <div class="card-content">
      <p>Future planning notes for relaxed base-style hiking on the Alentejo coast and Fisherman's Trail logistics.</p>
      <!-- Total sections: 1 | Style: Mobile-first cards with quick navigation | Last updated: April 2026 -->
      <div id="deck-nav"></div>
    </div>
  </header>

  <main class="card" aria-labelledby="toc-title">
    <div class="card-header">
      <h2 id="toc-title">Table of Contents</h2>
      <p class="meta">Choose a section to open its overview card.</p>
    </div>
    <div class="card-content">
      <ul class="toc-grid">
        <li class="toc-item">
          <a href="./sections/fishermans-trail/overview.html" class="toc-link">
            <h3>Fisherman's Trail</h3>
            <p>Condensed route, day-hike strategy from Milfontes, transport, and safety links.</p>
          </a>
        </li>
      </ul>
    </div>
  </main>

  <script>
    buildBreadcrumb('deck-nav', [
      { href: '../index.html', label: 'All decks' },
      { href: './index.html', label: 'Portugal Home' }
    ]);
  </script>
  <footer class="site-footer">
    <script>
      (function() {
        var footer = document.currentScript.parentElement;
        var nav = document.createElement('div');
        nav.className = 'footer-nav';
        var links = [];
        
        // Version link to home
        links.push({ href: '../../index.html', text: 'Version: codex/add-edinburgh-page-details' });
        
        // Deck link
        links.push({ href: 'index.html', text: 'Deck' });
        
        // Google Drive link
        links.push({ href: 'https://drive.google.com/drive/folders/1BDF-8Vz_8P5PIH_78GikTFfYA_ZtOoUS?usp=drive_link', text: 'Google Drive', external: true });
        
        // View all versions link
        links.push({ href: '../../index-versions.html', text: 'View all versions' });
        
        // Build the navigation
        links.forEach(function(link, index) {
          if (index > 0) {
            var sep = document.createElement('span');
            sep.className = 'footer-separator';
            sep.textContent = '|';
            nav.appendChild(sep);
          }
          var a = document.createElement('a');
          a.href = link.href;
          a.textContent = link.text;
          if (link.external) a.target = '_blank';
          nav.appendChild(a);
        });
        
        footer.appendChild(nav);
      })();
    </script>
  </footer>
</body>
</html>
